<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeerSec Terminal</title>

<style>
:root {
  --bg: #050505;
  --panel: #0d0d0d;
  --green: #00ff9c;
  --text: #b7ffd8;
  --border: #1a1a1a;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--green);
}

/* TERMINAL */
.terminal {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.6;
}

/* INPUT BAR */
.input-bar {
  display: flex;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}

.prompt {
  margin-right: 8px;
  color: var(--green);
}

input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  outline: none;
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 600px) {
  .terminal {
    font-size: 13px;
    padding: 15px;
  }
}
</style>
</head>

<body>

<div class="header">VeerSec Terminal v1.0</div>

<div class="terminal" id="terminal"></div>

<div class="input-bar">
  <span class="prompt">></span>
  <input id="cmd" autofocus />
</div>

<script>
const t = document.getElementById("terminal");
const input = document.getElementById("cmd");

function print(text) {
  const div = document.createElement("div");
  div.textContent = text;
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
}

print("Welcome to VeerSec Terminal");
print("Type 'help' to begin\n");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    print("> " + cmd);
    run(cmd);
    input.value = "";
  }
});

function run(cmd) {
  switch (cmd) {

    case "help":
      print("whoami | skills | projects | contact | clear");
      break;

    case "whoami":
      print("Veerxx — Cybersecurity Specialist");
      print("4+ years in VAPT");
      break;

    case "skills":
      print("Web Security");
      print("Network Pentesting");
      print("Burp Suite | Nmap | Metasploit");
      break;

    case "projects":
      print("Loading GitHub repos...");
      fetch("https://api.github.com/users/veersec/repos")
        .then(res => res.json())
        .then(data => {
          data.slice(0,5).forEach(repo => {
            print(repo.name + " → " + repo.html_url);
          });
        });
      break;

    case "contact":
      print("GitHub: https://github.com/veersec");
      break;

    case "clear":
      t.innerHTML = "";
      break;

    default:
      print("Command not found");
  }
}
</script>

</body>
</html>
